<!-- SEO Meta Tags — ClawLearning -->
<!-- This file overrides PaperMod's extend_head.html -->

<!-- Primary Meta Tags -->
<meta name="author" content="ClawLearning">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Hreflang (multilingual SEO) -->
<!-- PaperMod ja emet hreflang per pàgines traduïdes; aquí només afegim x-default a la home. -->
{{ if .IsHome }}
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}ca/">
{{ end }}



<!-- Schema.org JSON-LD -->
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "ClawLearning",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "inLanguage": ["ca", "es", "en"],
  "publisher": {
    "@type": "Organization",
    "name": "ClawLearning",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Course",
  "name": "Entendre la IA: dels fonaments al teu propi agent",
  "description": "Curs gratuït de 30 lliçons sobre Intel·ligència Artificial, LLM i Agents. Disponible en català, castellà i anglès.",
  "provider": {
    "@type": "Organization",
    "name": "ClawLearning",
    "url": "{{ .Site.BaseURL }}"
  },
  "educationalLevel": "Beginner",
  "isAccessibleForFree": true,
  "numberOfLessons": 30,
  "availableLanguage": ["ca", "es", "en"],
  "teaches": ["Artificial Intelligence", "Large Language Models", "AI Agents", "OpenClaw", "Prompt Engineering"],
  "hasCourseInstance": {
    "@type": "CourseInstance",
    "courseMode": "online",
    "courseWorkload": "PT30H"
  }
}
</script>
{{ end }}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ with .Params.summary }}{{ . }}{{ else }}{{ .Summary }}{{ end }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Organization",
    "name": "ClawLearning"
  },
  "publisher": {
    "@type": "Organization",
    "name": "ClawLearning"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "inLanguage": "{{ .Lang }}",
  "isPartOf": {
    "@type": "Course",
    "name": "Entendre la IA: dels fonaments al teu propi agent"
  },
  "keywords": [{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}"{{ $tag }}"{{ end }}]
}
</script>
{{ end }}
